# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

# Vulnerability database checks
[advisories]
# Deny any crate with a known security vulnerability
version = 2
ignore = []

# License policy
[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
exceptions = [
    # UEFI-only crate, not linked into the final binary on Linux/macOS
    { allow = ["LGPL-2.1-or-later"], crate = "r-efi" },
# CDLA-Permissive-2.0 is a permissive data license
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-root-certs" },
]

[licenses.private]
ignore = true

# Crate bans
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# Source provenance
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

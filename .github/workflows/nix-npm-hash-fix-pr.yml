name: Auto Fix npmDepsHash on PRs

# Reads only `web/package-lock.json` and `flake.nix` from the PR head via
# the GitHub API, computes the SRI hash with `prefetch-npm-deps` (the
# nixpkgs lockfile-only tool used internally by `buildNpmPackage`; no
# `npm install`, no postinstall scripts, no PR JS executed), and patches
# `flake.nix` either by pushing to a same-repo PR branch or by leaving a
# sticky comment with a copy-paste snippet on a fork PR. `pull_request_target`
# is safe here because the workflow file itself is taken from base, no PR
# tree is checked out, and no PR-supplied code is evaluated.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - web/package-lock.json

concurrency:
  group: nix-npm-hash-fix-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-fix:
    name: Compute and apply hash
    runs-on: ubuntu-latest
    if: github.event.pull_request.state == 'open'

    steps:
      # Workflow code from base (pull_request_target guarantee). No PR tree.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34

      - name: Detect fork and pin head SHA
        id: pr
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          if [ "$HEAD_REPO" = "$BASE_REPO" ]; then
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          fi
          echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          echo "head_ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"

      - name: Fetch lockfile and flake.nix from PR head (data, not code)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REPO: ${{ steps.pr.outputs.head_repo }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          set -euo pipefail
          mkdir -p pr-head/web
          gh api -H "Accept: application/vnd.github.raw" \
            "/repos/${HEAD_REPO}/contents/web/package-lock.json?ref=${HEAD_SHA}" \
            > pr-head/web/package-lock.json
          gh api -H "Accept: application/vnd.github.raw" \
            "/repos/${HEAD_REPO}/contents/flake.nix?ref=${HEAD_SHA}" \
            > pr-head/flake.nix

      - name: Compute new npmDepsHash
        id: hash
        run: |
          set -euo pipefail
          NEW_HASH=$(nix run --refresh nixpkgs#prefetch-npm-deps -- pr-head/web/package-lock.json)
          CUR_HASH=$(.github/scripts/get-flake-npm-hash.sh pr-head/flake.nix)
          echo "current=$CUR_HASH" >> "$GITHUB_OUTPUT"
          echo "computed=$NEW_HASH" >> "$GITHUB_OUTPUT"
          if [ "$NEW_HASH" = "$CUR_HASH" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push fix commit (same-repo PRs only)
        if: steps.hash.outputs.changed == 'true' && steps.pr.outputs.is_fork == 'false'
        env:
          # RELEASE_TOKEN is a PAT; pushes from PATs (unlike GITHUB_TOKEN)
          # retrigger downstream workflows, so the PR's `Nix Build Web`
          # check re-runs and goes green automatically.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NEW_HASH: ${{ steps.hash.outputs.computed }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$HEAD_REF" \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            pr-checkout

          # Confirm the PR head SHA has not advanced between the API fetch
          # above and this step; otherwise abort and let the next
          # synchronize event retrigger us.
          ACTUAL_SHA=$(git -C pr-checkout rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$HEAD_SHA" ]; then
            echo "head SHA moved ($HEAD_SHA -> $ACTUAL_SHA); next synchronize will retry."
            exit 0
          fi

          "$WORKSPACE/.github/scripts/set-flake-npm-hash.sh" pr-checkout/flake.nix "$NEW_HASH"

          # Defense in depth: only flake.nix may differ.
          if [ "$(git -C pr-checkout diff --name-only)" != "flake.nix" ]; then
            echo "::error::patch touched files other than flake.nix"
            git -C pr-checkout diff --name-only
            exit 1
          fi

          git -C pr-checkout config user.name "github-actions[bot]"
          git -C pr-checkout config user.email "github-actions[bot]@users.noreply.github.com"
          git -C pr-checkout commit \
            -m "fix(ci): update Nix npmDepsHash for web dependencies" \
            -m "Co-authored-by: ${PR_AUTHOR} <${PR_AUTHOR_ID}+${PR_AUTHOR}@users.noreply.github.com>" \
            flake.nix

          # --force-with-lease anchored to the SHA we read above so a
          # racing force-push from the contributor cannot be clobbered.
          git -C pr-checkout push \
            --force-with-lease="${HEAD_REF}:${HEAD_SHA}" \
            origin "HEAD:${HEAD_REF}"

      - name: Comment on fork PRs
        if: steps.hash.outputs.changed == 'true' && steps.pr.outputs.is_fork == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_HASH: ${{ steps.hash.outputs.computed }}
          CUR_HASH: ${{ steps.hash.outputs.current }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          MARKER="<!-- nix-npm-hash-fix-pr -->"
          {
            echo "$MARKER"
            echo
            echo "The \`Nix Build Web\` check fails because \`flake.nix\`'s \`npmDepsHash\` does not match this PR's \`web/package-lock.json\`. The bot cannot push to fork branches; please apply the one-line fix below."
            echo
            echo "**Old:** \`${CUR_HASH}\`  "
            echo "**New:** \`${NEW_HASH}\`"
            echo
            echo "From your PR's checkout:"
            echo
            echo '```'
            echo "sed -i -E '/^[[:space:]]*npmDepsHash[[:space:]]*=[[:space:]]*\"sha256-/s|sha256-[^\"]*|${NEW_HASH}|' flake.nix"
            echo "git add flake.nix"
            echo "git commit -m 'fix(ci): update Nix npmDepsHash for web dependencies'"
            echo "git push"
            echo '```'
          } > /tmp/comment-body.md

          # Upsert: edit the existing sticky comment if present, else create.
          # `databaseId` (not `id`) returns the numeric REST ID; the GraphQL
          # node id `IC_kw...` 404s on the REST PATCH endpoint below.
          EXISTING=$(gh pr view "$PR_NUMBER" --json comments \
            --jq '.comments[] | select(.body | startswith("<!-- nix-npm-hash-fix-pr -->")) | .databaseId' \
            | head -n1)
          if [ -n "$EXISTING" ]; then
            gh api --method PATCH "/repos/${{ github.repository }}/issues/comments/${EXISTING}" \
              -f body="$(cat /tmp/comment-body.md)" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/comment-body.md
          fi

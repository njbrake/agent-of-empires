name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Run Vitest unit tests
        working-directory: web
        run: npm run test:unit

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install dependencies and build
        working-directory: web
        run: npm ci && npm run build
      - name: Validate coverage matrix
        working-directory: web
        run: node tests/validate-coverage-matrix.mjs
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

  playwright-live:
    name: Playwright (live)
    runs-on: ubuntu-latest
    # Only spin up the live job when changes can plausibly affect the
    # surface it covers. Docs-only or website-only PRs skip it.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: "false"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Build aoe with serve feature
        run: cargo build --features serve --release
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run live Playwright suite
        working-directory: web
        env:
          AOE_E2E_BINARY: ${{ github.workspace }}/target/release/aoe
        run: npx playwright test --config=playwright.live.config.ts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-live-report
          path: web/playwright-live-report/
          retention-days: 14

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: "false"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Build aoe with instrumented web bundle
        env:
          AOE_COVERAGE: '1'
        run: cargo build --features serve --release
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run Vitest with coverage
        working-directory: web
        env:
          AOE_COVERAGE: '1'
        run: npm run test:unit -- --coverage
      - name: Run mocked Playwright with coverage
        working-directory: web
        env:
          AOE_COVERAGE: '1'
        run: npx playwright test --config=playwright.config.ts
        continue-on-error: true
      - name: Run live Playwright with coverage
        working-directory: web
        env:
          AOE_COVERAGE: '1'
          AOE_E2E_BINARY: ${{ github.workspace }}/target/release/aoe
        run: |
          if [ -f playwright.live.config.ts ]; then
            npx playwright test --config=playwright.live.config.ts
          else
            echo "playwright.live.config.ts not yet present; skipping live run"
          fi
        continue-on-error: true
      - name: Merge coverage
        working-directory: web
        run: npm run coverage:merge
      - name: Upload merged coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-merged
          path: web/coverage/merged/
          retention-days: 14
      - name: Upload to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: web/coverage/merged/lcov.info
          flags: frontend
          name: web-frontend-merged
          fail_ci_if_error: false
          # Components defined in codecov.yml at the repo root segment the
          # PR comment by user-facing surface. Per-test-type splits
          # (vitest / playwright-mocked / playwright-live) become
          # additional uploads with their own flags in a follow-up.

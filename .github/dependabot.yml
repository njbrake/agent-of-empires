version: 2
updates:
  # cargo
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-major-days: 28
    groups:
      cargo-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # docker
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-major-days: 28

  # github-actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github_actions"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-major-days: 28
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # npm: web
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
      - "area:web"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-major-days: 28
    groups:
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types: ["minor", "patch"]
      web-minor-patch:
        patterns: ["*"]
        exclude-patterns:
          - "react"
          - "react-dom"
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tailwindcss/*"
        update-types: ["version-update:semver-major"]

  # npm: cockpit-worker/aoe-agent
  - package-ecosystem: "npm"
    directory: "/cockpit-worker/aoe-agent"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
      - "area:cockpit"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-major-days: 28
    groups:
      ai-sdk:
        patterns: ["@ai-sdk/*", "ai"]
        update-types: ["minor", "patch"]
      acp:
        patterns: ["@agentclientprotocol/*"]
        update-types: ["minor", "patch"]
      aoe-agent-other-minor-patch:
        patterns: ["*"]
        exclude-patterns:
          - "@ai-sdk/*"
          - "ai"
          - "@agentclientprotocol/*"
        update-types: ["minor", "patch"]

  # npm: cockpit-worker/test-shim
  - package-ecosystem: "npm"
    directory: "/cockpit-worker/test-shim"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "javascript"
      - "area:cockpit"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-major-days: 28
    groups:
      acp:
        patterns: ["@agentclientprotocol/*"]
        update-types: ["minor", "patch"]

  # npm: website
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-major-days: 28
    groups:
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types: ["minor", "patch"]
      website-minor-patch:
        patterns: ["*"]
        exclude-patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tailwindcss/*"
        update-types: ["version-update:semver-major"]

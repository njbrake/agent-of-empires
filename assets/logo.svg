        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cursor _ -->
  <line x1="82" y1="108" x2="114" y2="108"
        stroke="#0d9488" stroke-width="10" stroke-linecap="round"/>
</svg>

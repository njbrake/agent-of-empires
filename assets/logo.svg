<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="win-back" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="win-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Back terminal window -->
  <rect x="6" y="38" width="72" height="56" rx="6" fill="url(#win-back)" opacity="0.7"/>

  <!-- Front terminal window -->
  <g>
    <!-- Window body -->
    <rect x="36" y="18" width="80" height="66" rx="6" fill="url(#win-front)"/>
    <!-- Title bar -->
    <rect x="36" y="18" width="80" height="18" rx="6" fill="url(#titlebar)"/>
    <rect x="36" y="30" width="80" height="6" fill="url(#titlebar)"/>
    <!-- Traffic light dots -->
    <circle cx="50" cy="28" r="2.8" fill="#b45309" opacity="0.55"/>
    <circle cx="59" cy="28" r="2.8" fill="#b45309" opacity="0.55"/>
    <circle cx="68" cy="28" r="2.8" fill="#b45309" opacity="0.55"/>
    <!-- Terminal content area -->
    <rect x="40" y="39" width="72" height="41" rx="3" fill="#b45309" opacity="0.22"/>
    <!-- $ prompt -->
    <text x="49" y="65" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#fef3c7" opacity="0.85">$</text>
    <!-- Cursor block -->
    <rect x="68" y="51" width="9" height="17" rx="2" fill="#fef3c7" opacity="0.75"/>
  </g>
</svg>
